# Autotuner search space (spec section 8.2).
#
# Phase 2 (Optuna TPE) samples the numeric/categorical ranges below within the structure
# fixed by Phase 1. Each parameter declares a type and bounds/choices; the sampler in
# polymbappe.tune.search_space interprets them. Parameters are grouped by component.
#
# Every parameter here is wired into the backtest objective (tune/objective.py ->
# eval/backtest.py); sampling one changes the score. Knobs that the backtest cannot
# exercise are deliberately *omitted* so TPE never wastes trials on inert dimensions:
#   * bayesian.*           - NUTS per tournament across an 11-fold loop would take days;
#                            exercised separately via `polymbappe bayesian-ab`.
#   * features.xg_window   - feeds the offline FeaturePipeline only, not the backtest path.
#   * contextual.*         - cohesion/manager/fatigue 0-fill for all historical tournaments
#                            (only WC2026 has squad / manager data), so the contextual layer
#                            fits on noise in the LOTO backtest. Contextual features are
#                            handled by the live adaptive weighting system (`contextual-monitor`)
#                            and are disabled in backtest by default.
#   * squad_value_ratio    - WC2026 rosters only; no historical squad snapshots to backtest.

dixon_coles:
  # xi: time-decay half-life. Tightened bounds avoid extreme values that cause the DC
  # optimiser to exit at iteration 0 (flat gradient / singular Hessian at the boundary).
  xi: {type: float, low: 0.001, high: 0.003}
  friendly_weight: {type: float, low: 0.1, high: 0.5}
  max_goals: {type: categorical, choices: [8, 10, 12]}
  # goals_cap: hard cap on observed goals per team to prevent extreme scorelines such as
  # Norway 11-1 Moldova from dominating the Poisson likelihood and inflating parameters.
  goals_cap: {type: categorical, choices: [6, 7, 8, null]}
  # l2_attack / l2_defense: L2 regularization pulling extreme estimates toward the global
  # mean.  0 = no regularization; higher values shrink parameters more aggressively.
  l2_attack: {type: float, low: 0.0, high: 2.0}
  l2_defense: {type: float, low: 0.0, high: 2.0}
  # afc_qualifier_weight: down-weights AFC-vs-AFC WC qualification matches.  Asian WC
  # qualifiers include very weak teams (Myanmar, Indonesia, etc.) whose heavy losses
  # inflate the parameters of stronger Asian sides beyond what European/SA data supports.
  afc_qualifier_weight: {type: float, low: 0.2, high: 0.7}
  # altitude_qualifier_weight: down-weights home WC qualifier matches for Ecuador/Bolivia.
  # Their home venues (Quito ~2800m, La Paz ~3600m) cause visiting teams to score fewer
  # goals due to altitude rather than defensive quality — an effect absent at WC2026 venues.
  altitude_qualifier_weight: {type: float, low: 0.2, high: 0.7}

features:
  elo_k_factor: {type: float, low: 10.0, high: 40.0}
  draw_max: {type: float, low: 0.20, high: 0.32}
  # Tier-1 rolling form (gs/ga/pts over 5 and 10 matches), H2H win rate, and rest days.
  # All are leakage-safe (shift-1 rolling windows) and feed the GBM; no-ops when GBM is off.
  toggle_rolling_form: {type: categorical, choices: [true, false]}
  toggle_h2h: {type: categorical, choices: [true, false]}
  toggle_rest_days: {type: categorical, choices: [true, false]}

gbm:
  # GBM stacks over the base-model H/D/A outputs; `enable` lets TPE switch the layer in/out.
  # min_child_samples floor raised to 30 (from 10) — LOTO folds are ~100 matches so a low
  # floor lets the GBM memorise fold-specific noise rather than learning a general signal.
  enable: {type: categorical, choices: [true, false]}
  num_leaves: {type: int, low: 15, high: 63}
  learning_rate: {type: float, low: 0.01, high: 0.1, log: true}
  n_estimators: {type: int, low: 50, high: 300}
  min_child_samples: {type: int, low: 30, high: 100}

ensemble:
  meta_C: {type: float, low: 0.1, high: 10.0, log: true}
  meta_learner: {type: categorical, choices: [logistic, isotonic, weighted_average]}

# Phase 1 (LLM structural search) operates outside this numeric space — see
# polymbappe.tune.llm_search for the structural-experiment proposals.
