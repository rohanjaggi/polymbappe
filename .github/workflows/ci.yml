name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies (all extras)
        run: uv sync --all-extras

      - name: Ruff
        run: uv run ruff check

      - name: Tests
        run: uv run pytest
